<!DOCTYPE html>
<html lang="en" data-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TypeScript Canvas</title>
    <style>
       
        :root {
            --chrome-bg: #2b2b2b;
            --chrome-border: #444;
            --chrome-text: #ddd;
            --chrome-text-muted: #999;
            --input-bg: #3a3a3a;
            --input-border: #555;
            --grid-bg: #202124;      
            --toggle-bg: #3a3a3a;
            --toggle-border: #666;
            --toggle-text: #f0c419; 
        }

        html[data-theme="light"] {
            --chrome-bg: #f8f9fa;     
            --chrome-border: #c0c0c0;
            --chrome-text: #202124;
            --chrome-text-muted: #5f6368;
            --input-bg: #ffffff;
            --input-border: #c0c0c0;
            --grid-bg: #ffffff;     
            --toggle-bg: #ffffff;
            --toggle-border: #c0c0c0;
            --toggle-text: #444746;
        }

        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        body {
            background-color: var(--chrome-bg);
            color: var(--chrome-text);
        }

        .app-layout {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }

       
        .app-header {
            background-color: var(--chrome-bg);
            padding: 8px 14px;
            border-bottom: 1px solid var(--chrome-border);
        }

        .nav-controls {
            display: flex;
            align-items: flex-end;
            gap: 16px;
            flex-wrap: wrap;
        }

        .ctrl-group {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding-right: 16px;
            border-right: 1px solid var(--chrome-border);
        }
        .ctrl-group:last-child {
            border-right: none;
            padding-right: 0;
        }

        .field {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .field label {
            font-size: 11px;
            color: var(--chrome-text-muted);
            white-space: nowrap;
        }

        .nav-controls select,
        .nav-controls input[type="number"],
        .nav-controls button {
            height: 28px;
            padding: 0 8px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            color: var(--chrome-text);
            font-size: 13px;
            border-radius: 3px;
            box-sizing: border-box;
        }

        .nav-controls input[type="color"] {
            width: 32px;
            height: 28px;
            border: 1px solid var(--input-border);
            background-color: var(--input-bg);
            padding: 2px;
            border-radius: 3px;
            box-sizing: border-box;
            cursor: pointer;
        }

        #font-size { width: 55px; }
        #row-offset { width: 65px; }

        
        #theme-toggle {
            background-color: var(--toggle-bg);
            border-color: var(--toggle-border);
            color: var(--toggle-text);
            font-weight: bold;
            cursor: pointer;
        }
        #theme-toggle:hover {
            filter: brightness(1.15);
        }

        #load-data-btn {
            background-color: #1a73e8;
            border-color: #1a73e8;
            color: #ffffff;
            font-weight: bold;
            cursor: pointer;
        }
        #load-data-btn:hover {
            background-color: #1765cc;
        }

        #json-upload {
            font-size: 12px;
            color: var(--chrome-text-muted);
            max-width: 140px;
        }

        
        .app-content {
            flex: 1;
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--grid-bg);
        }

        #myCanvas {
            position: absolute;
            top: 0;
            left: 0;
            display: block;
        }

       
        .app-footer {
            background-color: var(--chrome-bg);
            padding: 0 14px;
            border-top: 1px solid var(--chrome-border);
            font-size: 12px;
            color: var(--chrome-text-muted);
            height: 28px;
            display: flex;
            align-items: center;
        }

        .metrics-display {
            display: flex;
            gap: 18px;
        }

        .metrics-display strong {
            color: var(--chrome-text);
        }
    </style>
</head>

<body>
    <div class="app-layout">
        <nav class="app-header">
            <div class="nav-controls">

                <div class="ctrl-group">
                    <div class="field">
                        <label for="font-family">Font</label>
                        <select id="font-family">
                            <option value="Arial">Arial</option>
                            <option value="Courier New">Courier New</option>
                        </select>
                    </div>
                    <div class="field">
                        <label for="font-size">Size</label>
                        <input type="number" id="font-size" value="14" min="10" max="30">
                    </div>
                </div>

                <div class="ctrl-group">
                    <div class="field">
                        <label for="font-color">Font Color</label>
                        <input type="color" id="font-color" value="#000000" title="Font Color">
                    </div>
                    <div class="field">
                        <label for="bg-color">Background Color</label>
                        <input type="color" id="bg-color" value="#ffffff" title="Background Color">
                    </div>
                </div>

                <div class="ctrl-group">
                    <div class="field">
                        <label for="row-offset">Row Offset</label>
                        <input type="number" id="row-offset" value="1" min="1" placeholder="1">
                    </div>
                    <div class="field">
                        <label for="json-upload">Import JSON</label>
                        <input type="file" id="json-upload" accept=".json">
                    </div>
                    <div class="field">
                        <label>&nbsp;</label>
                        <button id="load-data-btn">Load Data</button>
                    </div>
                </div>

                <div class="ctrl-group" style="border-right:none; padding-right:0; margin-left:auto;">
                    <div class="field">
                        <label>&nbsp;</label>
                        <button id="theme-toggle">Dark Mode</button>
                    </div>
                </div>

            </div>
        </nav>

        <main class="app-content" id="canvas-container">
            <canvas id="myCanvas"></canvas>
        </main>

        <footer class="app-footer">
            <div class="metrics-display">
                <span>Selected Range: <strong id="metric-range">None</strong></span>
                <span>Sum: <strong id="metric-sum">0</strong></span>
                <span>Avg: <strong id="metric-avg">0</strong></span>
                <span>Min: <strong id="metric-sum">0</strong></span>
                <span>Max: <strong id="metric-avg">0</strong></span>
                <span>Count: <strong id="metric-count">0</strong></span>
            </div>
        </footer>
    </div>

    <script src="./dist/script.js" type="module"></script>
</body>

</html>
